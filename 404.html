<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>AsaanSafar</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script takes the current url and converts the path and query string into just a query string,
      // then redirects the browser to the new url with only a query string and hash fragment.
      
      // If hosting on a custom domain (e.g. asaanbussafar.com), set pathSegmentsToKeep to 0.
      // If hosting on github.io subdirectory (e.g. username.github.io/repo/), set pathSegmentsToKeep to 1.
      var pathSegmentsToKeep = window.location.hostname.indexOf('github.io') !== -1 ? 1 : 0;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
